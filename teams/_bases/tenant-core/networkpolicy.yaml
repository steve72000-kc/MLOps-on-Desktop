apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-default
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress: []
  egress:
  # Injected tenant pods need both xDS (`istiod`) and workload-cert issuance
  # (`cert-manager-istio-csr`) at the namespace baseline. Data-plane ingress is
  # opened with workload-specific policies.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
      podSelector:
        matchLabels:
          app: istiod
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
      podSelector:
        matchLabels:
          app: cert-manager-istio-csr
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
