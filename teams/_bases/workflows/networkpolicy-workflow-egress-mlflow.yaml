apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-egress-mlflow
spec:
  podSelector:
    matchLabels:
      platform.ai-ml/network-role: workflow
  policyTypes:
  - Egress
  egress:
  # Use the destination pod selector instead of a fixed port because MLflow is
  # fronted by a Service and the target pod port depends on the chart wiring.
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: mlflow
