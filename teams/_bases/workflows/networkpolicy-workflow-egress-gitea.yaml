apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-egress-gitea
spec:
  podSelector:
    matchLabels:
      platform.ai-ml/network-role: workflow
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gitea
      podSelector:
        matchLabels:
          app.kubernetes.io/name: gitea
    ports:
    - protocol: TCP
      port: 3000
