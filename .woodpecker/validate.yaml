steps:
  - name: validate
    image: python:3.12-bookworm
    commands:
      - apt-get update
      - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends bash ca-certificates curl git shellcheck
      - KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
      - curl -L -o /usr/local/bin/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
      - chmod +x /usr/local/bin/kubectl
      - kubectl version --client
      - ./scripts/validate.sh
when:
  event: [push, pull_request, manual]
