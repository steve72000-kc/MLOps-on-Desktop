apiVersion: batch/v1
kind: Job
metadata:
  name: minio-tenant-bootstrap
  namespace: minio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-tenant-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: quay.io/minio/mc:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - /config/bootstrap.sh
        env:
        - name: MINIO_ENDPOINT
          value: http://minio.minio.svc.cluster.local:9000
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_PASSWORD
        - name: MLFLOW_TEAM_A_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-tenant-credentials
              key: MLFLOW_TEAM_A_ACCESS_KEY
        - name: MLFLOW_TEAM_A_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-tenant-credentials
              key: MLFLOW_TEAM_A_SECRET_KEY
        - name: MLFLOW_TEAM_B_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-tenant-credentials
              key: MLFLOW_TEAM_B_ACCESS_KEY
        - name: MLFLOW_TEAM_B_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-tenant-credentials
              key: MLFLOW_TEAM_B_SECRET_KEY
        volumeMounts:
        - name: bootstrap-config
          mountPath: /config
      volumes:
      - name: bootstrap-config
        configMap:
          name: minio-tenant-bootstrap
          defaultMode: 0755
