apiVersion: v1
kind: ConfigMap
metadata:
  name: config-deployment
  namespace: knative-serving
data:
  # Increase queue-proxy baseline resources to reduce readiness probe flakiness
  # during model server cold start and mesh sidecar startup overlap.
  queue-sidecar-cpu-request: "100m"
  queue-sidecar-memory-request: "256Mi"
  queue-sidecar-cpu-limit: "500m"
  queue-sidecar-memory-limit: "512Mi"
