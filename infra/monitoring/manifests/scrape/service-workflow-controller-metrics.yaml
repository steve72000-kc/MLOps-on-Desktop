apiVersion: v1
kind: Service
metadata:
  name: workflow-controller-metrics
  namespace: argo
  labels:
    app.kubernetes.io/name: workflow-controller-metrics
    app.kubernetes.io/part-of: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  selector:
    app: workflow-controller
  ports:
  - name: metrics
    port: 9090
    targetPort: metrics
