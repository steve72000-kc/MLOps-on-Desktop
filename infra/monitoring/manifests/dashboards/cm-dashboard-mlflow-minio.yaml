apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mlflow-minio
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: monitoring
  annotations:
    grafana_folder: Platform
    argocd.argoproj.io/sync-wave: "30"
data:
  mlflow-minio-health.json: |-
    {
      "title": "Platform / MLflow + MinIO",
      "uid": "platform-mlflow-minio",
      "tags": ["platform", "mlflow", "minio"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "MLflow Ready Pods",
          "datasource": "Prometheus",
          "targets": [{"refId": "A", "expr": "sum(kube_pod_status_ready{condition=\"true\",namespace=~\"ml-team-.*\",pod=~\"mlflow.*\"})"}],
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "MLflow Restarts / 15m",
          "datasource": "Prometheus",
          "targets": [{"refId": "A", "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"ml-team-.*\",pod=~\"mlflow.*\"}[15m]))"}],
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "MinIO Available Replicas",
          "datasource": "Prometheus",
          "targets": [{"refId": "A", "expr": "sum(kube_deployment_status_replicas_available{namespace=\"minio\",deployment=\"minio\"})"}],
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "MinIO PVC Usage (%)",
          "datasource": "Prometheus",
          "targets": [{"refId": "A", "expr": "100 * kubelet_volume_stats_used_bytes{namespace=\"minio\",persistentvolumeclaim=\"minio-pvc\"} / clamp_min(kubelet_volume_stats_capacity_bytes{namespace=\"minio\",persistentvolumeclaim=\"minio-pvc\"}, 1)"}],
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "MLflow Pod Restart Trend",
          "datasource": "Prometheus",
          "targets": [{"refId": "A", "expr": "sum by (namespace,pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"ml-team-.*\",pod=~\"mlflow.*\"}[15m]))"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "MinIO Pod Restarts",
          "datasource": "Prometheus",
          "targets": [{"refId": "A", "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"minio\",pod=~\"minio.*\"}[15m]))"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}
        }
      ]
    }
