apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-team-a-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
  - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitops-admin/ai-ml.git
    targetRevision: HEAD
    path: teams/ml-team-a
  destination:
    server: https://kubernetes.default.svc
    namespace: ml-team-a
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
