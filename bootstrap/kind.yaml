kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: aiml
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  - containerPort: 30001
    hostPort: 9001
    protocol: TCP
  - containerPort: 30002
    hostPort: 9002
    protocol: TCP
  - containerPort: 30003
    hostPort: 9003
    protocol: TCP
  - containerPort: 30004
    hostPort: 9004
    protocol: TCP
- role: worker
- role: worker
